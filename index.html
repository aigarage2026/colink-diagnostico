<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colink — Diagnóstico de Processos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- SheetJS para leitura de Excel no browser -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0d0e11; --surface: #14161b; --surface2: #1c1f27;
    --border: #252830; --accent: #e8c872; --accent2: #6e9aff;
    --text: #e8e9ec; --muted: #7a7f8e; --danger: #ff6b6b;
    --success: #5fcb8e; --user-bubble: #1e2535; --ai-bubble: #191b22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif;
    font-size:14px; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  header { display:flex; align-items:center; gap:14px; padding:16px 24px;
    border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  .logo-mark { width:36px; height:36px; background:white; border-radius:8px;
    padding:3px; overflow:hidden; flex-shrink:0; }
  .logo-mark img { width:100%; height:100%; object-fit:contain; display:block; }
  .header-text h1 { font-family:'DM Serif Display',serif; font-size:17px; line-height:1.2; }
  .header-text p { font-size:11px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; }
  .status-dot { margin-left:auto; display:flex; align-items:center; gap:6px;
    font-size:11px; color:var(--muted); }
  .dot { width:6px; height:6px; border-radius:50%; background:var(--success); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .steps-bar { display:flex; padding:0 24px; background:var(--surface);
    border-bottom:1px solid var(--border); overflow-x:auto; flex-shrink:0; scrollbar-width:none; }
  .steps-bar::-webkit-scrollbar { display:none; }
  .step-chip { padding:8px 16px; font-size:11px; color:var(--muted); white-space:nowrap;
    border-bottom:2px solid transparent; transition:all .2s; letter-spacing:.04em; }
  .step-chip.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:500; }
  .step-chip.done { color:var(--success); border-bottom-color:var(--success); }

  #chat { flex:1; overflow-y:auto; padding:28px 24px; display:flex;
    flex-direction:column; gap:20px; scroll-behavior:smooth; }
  #chat::-webkit-scrollbar { width:4px; }
  #chat::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  .msg { display:flex; flex-direction:column; max-width:82%; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self:flex-end; align-items:flex-end; }
  .msg.ai { align-self:flex-start; align-items:flex-start; }
  .msg-label { font-size:10px; color:var(--muted); margin-bottom:5px;
    letter-spacing:.06em; text-transform:uppercase; font-weight:500; }
  .msg.ai .msg-label { color:var(--accent); }
  .bubble { padding:14px 18px; border-radius:14px; line-height:1.65; font-size:13.5px; }
  .msg.user .bubble { background:var(--user-bubble); border-bottom-right-radius:4px;
    border:1px solid #2a2f3d; }
  .msg.ai .bubble { background:var(--ai-bubble); border-bottom-left-radius:4px;
    border:1px solid var(--border); }
  .bubble p { margin-bottom:10px; }
  .bubble p:last-child { margin-bottom:0; }
  .bubble strong { color:var(--accent); font-weight:600; }
  .bubble em { color:var(--accent2); font-style:normal; font-weight:500; }
  .bubble table { border-collapse:collapse; width:100%; margin:10px 0; font-size:12.5px; }
  .bubble th { background:var(--surface2); color:var(--muted); padding:7px 10px;
    text-align:left; font-weight:500; font-size:11px; letter-spacing:.04em; text-transform:uppercase; }
  .bubble td { padding:7px 10px; border-top:1px solid var(--border); }
  .bubble ul,.bubble ol { padding-left:18px; margin:8px 0; }
  .bubble li { margin-bottom:5px; line-height:1.5; }

  /* Preview de arquivo anexado */
  .attachment-preview {
    display:flex; align-items:center; gap:10px; margin-bottom:8px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:10px 14px; max-width:100%;
  }
  .attachment-preview .att-icon { font-size:20px; flex-shrink:0; }
  .attachment-preview .att-info { flex:1; min-width:0; }
  .attachment-preview .att-name { font-size:12px; font-weight:600; color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .attachment-preview .att-meta { font-size:11px; color:var(--muted); margin-top:2px; }
  .attachment-preview .att-remove { background:none; border:none; color:var(--muted);
    cursor:pointer; font-size:16px; padding:0 4px; flex-shrink:0; }
  .attachment-preview .att-remove:hover { color:var(--danger); }

  /* Imagem no chat */
  .bubble img.chat-img { max-width:260px; border-radius:8px; margin-top:8px; display:block; }

  .thinking { display:flex; align-items:center; gap:8px; padding:12px 18px;
    background:var(--ai-bubble); border:1px solid var(--border);
    border-radius:14px; border-bottom-left-radius:4px; font-size:12px; color:var(--muted); }
  .dots { display:flex; gap:4px; }
  .dots span { width:5px; height:5px; border-radius:50%; background:var(--accent);
    animation:bounce 1.2s infinite; }
  .dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.5} 30%{transform:translateY(-5px);opacity:1} }

  /* Input area */
  .input-area { padding:12px 24px 18px; background:var(--surface);
    border-top:1px solid var(--border); flex-shrink:0; }

  /* Barra de anexo pendente */
  #pendingAttachment { display:none; margin-bottom:8px; }

  .input-row { display:flex; gap:10px; align-items:flex-end; }

  /* Botão de clipe */
  #attachBtn {
    width:48px; height:48px; border-radius:12px; background:var(--surface2);
    border:1px solid var(--border); cursor:pointer; display:flex; align-items:center;
    justify-content:center; transition:all .2s; flex-shrink:0; color:var(--muted);
    font-size:20px;
  }
  #attachBtn:hover { border-color:var(--accent); color:var(--accent); }

  #inputBox { flex:1; background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; padding:12px 16px; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:13.5px; resize:none;
    min-height:48px; max-height:140px; outline:none; transition:border-color .2s;
    line-height:1.5; overflow-y:auto; }
  #inputBox:focus { border-color:var(--accent); }
  #inputBox::placeholder { color:var(--muted); }

  #sendBtn { width:48px; height:48px; border-radius:12px; background:var(--accent);
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all .2s; flex-shrink:0; }
  #sendBtn:hover { background:#f0d484; transform:scale(1.04); }
  #sendBtn:active { transform:scale(.97); }
  #sendBtn:disabled { opacity:.4; cursor:default; transform:none; }
  #sendBtn svg { width:18px; height:18px; fill:#0d0e11; }

  .input-hint { font-size:10.5px; color:var(--muted); margin-top:8px; }

  .error-bubble { background:rgba(255,107,107,.08); border:1px solid rgba(255,107,107,.2);
    color:var(--danger); font-size:12.5px; padding:10px 14px; border-radius:10px; margin-top:8px; }

  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
</style>
</head>

<div id="chat"></div>

<div class="input-area">
  <!-- Preview do arquivo pendente -->
  <div id="pendingAttachment"></div>

  <div class="input-row">
    <!-- Botão clipe -->
    <button id="attachBtn" title="Anexar arquivo" onclick="document.getElementById('fileInput').click()">
      📎
    </button>
    <input type="file" id="fileInput" style="display:none"
      accept=".jpg,.jpeg,.png,.gif,.webp,.xlsx,.xls,.csv,.pdf,.docx,.doc,.txt"
      onchange="handleFileSelect(this)">

    <textarea id="inputBox"
      placeholder="Descreva o processo, cole um texto ou envie um arquivo..."
      rows="1"></textarea>

    <button id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
  <div class="input-hint">Enter para enviar · Shift+Enter para nova linha · 📎 para anexar arquivo</div>
</div>

<script>
const SYSTEM_PROMPT = `Você é o consultor de IA da Colink Business Consulting, especializado em auditoria e mapeamento de processos empresariais.

Seu trabalho segue rigorosamente a metodologia Colink:

## OS 10 STEPS PARA MELHORIA E AUTOMAÇÃO

| Step | Pergunta | SIM | NÃO |
|---|---|---|---|
| 1 | O processo está mapeado como realmente ocorre? | → Step 2 | → Mapear o processo real |
| 2 | O processo é estável? | → Step 3 | → Estabilizar o processo |
| 3 | Os dados são íntegros e consistentes? | → Step 4 | → Elevar maturidade dos dados |
| 4 | O gargalo está identificado? | → Step 5 | → Identificar o gargalo |
| 5 | Existe padrão operacional definido? | → Step 6 | → Padronizar o processo |
| 6 | Há oportunidades reais de melhoria? | → Melhorar | → Step 7 |
| 7 | O processo é repetitivo e com baixa ambiguidade? | → Step 8 | → Reduzir ambiguidade |
| 8 | Automação por regras ou por agentes de IA? | RPA/Workflow | → Step 9 |
| 9 | Os limites de autonomia dos agentes estão definidos? | → Step 10 | → Definir autonomia |
| 10 | A governança pós-automação está preparada? | → Implementar | → Estabelecer governança |

## FLUXO DE TRABALHO

1. **Inventário** — Pergunte que arquivos ou contexto o usuário tem
2. **Entrevista diagnóstica** — Conduza os 10 Steps com perguntas de aprofundamento
3. **Análise** — Identifique tipo de processo, ferramentas, responsáveis, volumes
4. **AS-IS / TO-BE** — Mapeie situação atual e proponha melhorias com IA
5. **Roadmap** — Curto (0-3m), Médio (3-6m), Longo prazo (6-12m)

## FRAMEWORK DE IA APLICADA (COLINK)

**Princípio central:** Sem processo estruturado, IA não tem onde atuar. A sequência correta é: estruturar → padronizar → digitalizar → automatizar → agentes de IA.

**Onde IA funciona bem:**
- Fórmulas e regras claras
- Processos repetitivos
- Resultado probabilístico aceitável
- Baixa ambiguidade
- Tarefas descritas em passos

**Onde IA tem limitações:**
- Cálculos fiscais exatos (margem zero)
- Decisões médicas determinísticas
- Julgamento subjetivo complexo
- Alta ambiguidade contextual

**Decisão: RPA vs. Agentes de IA**
- RPA/Workflow: regras fixas, entradas padronizadas, 1 resposta correta
- Agentes IA: variações, texto livre, "80% correto" já gera valor, alto volume

**Níveis de maturidade:**
- NÍVEL 0 CAÓTICO → Mapear o processo
- NÍVEL 1 DEFINIDO → Padronizar + POP
- NÍVEL 2 PADRONIZADO → Identificar melhorias
- NÍVEL 3 DIGITALIZADO → Automação por regras
- NÍVEL 4 AUTOMATIZADO → Agentes de IA
- NÍVEL 5 INTELIGENTE → Otimizar e expandir

## TOM E ESTILO

- Seja objetivo, consultivo e direto
- Use tabelas para estruturar diagnósticos
- Identifique o Step em que o processo está
- Sempre proponha next steps concretos
- Responda em português (Brasil)
- Quando identificar oportunidade de IA, seja específico sobre tipo (RPA vs. Agente) e benefício
- Não invente dados — pergunte quando não tiver informação

## INÍCIO

Ao iniciar, cumprimente brevemente e pergunte:
1. Qual empresa/setor?
2. Qual processo quer auditar?
3. Tem arquivos ou documentação para compartilhar?

**REGRA CRÍTICA:** Faça APENAS UMA pergunta por mensagem. Nunca liste múltiplas perguntas de uma vez. Espere sempre a resposta antes de fazer a próxima.

Ao iniciar: cumprimente brevemente e pergunte APENAS qual empresa/setor.
Após resposta: pergunte APENAS qual processo quer auditar.
Após resposta: pergunte APENAS se tem arquivos ou documentação.
Depois: siga a entrevista dos 10 Steps, uma pergunta por vez.`;

let history = [];
let currentStep = 1;
let isLoading = false;
let pendingFile = null; // { type, name, size, data } 

const chat = document.getElementById('chat');
const inputBox = document.getElementById('inputBox');
const sendBtn = document.getElementById('sendBtn');

// ─── STEPS ───────────────────────────────────────────────────────────────────
function updateSteps(step) {
  currentStep = step;
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById('s' + i);
    el.className = 'step-chip';
    if (i < step) el.classList.add('done');
    else if (i === step) el.classList.add('active');
  }
}

// ─── MESSAGES ────────────────────────────────────────────────────────────────
function addMessage(role, content, imgSrc) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'Você' : 'Colink IA';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (imgSrc) {
    const img = document.createElement('img');
    img.src = imgSrc;
    img.className = 'chat-img';
    bubble.appendChild(img);
    if (content) {
      const p = document.createElement('p');
      p.style.marginTop = '8px';
      p.innerHTML = formatMarkdown(content);
      bubble.appendChild(p);
    }
  } else {
    bubble.innerHTML = formatMarkdown(content);
  }

  msg.appendChild(label);
  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

// ─── MARKDOWN ────────────────────────────────────────────────────────────────
function formatMarkdown(text) {
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
  text = text.replace(/^### (.+)$/gm, '<p style="font-size:13px;font-weight:600;color:var(--accent);margin-top:14px;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase;">$1</p>');
  text = text.replace(/^## (.+)$/gm, '<p style="font-family:\'DM Serif Display\',serif;font-size:16px;margin-top:14px;margin-bottom:8px;">$1</p>');
  text = text.replace(/^# (.+)$/gm, '<p style="font-family:\'DM Serif Display\',serif;font-size:18px;color:var(--accent);margin-bottom:10px;">$1</p>');
  text = parseTable(text);
  text = text.replace(/^[-•] (.+)$/gm, '<li>$1</li>');
  text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  text = text.replace(/`([^`]+)`/g, '<code style="background:rgba(255,255,255,.07);padding:2px 6px;border-radius:4px;font-family:monospace;font-size:12px;">$1</code>');
  text = text.replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:12px 0;">');
  text = text.split('\n\n').map(p => {
    if (p.trim() && !p.includes('<table') && !p.includes('<ul') && !p.includes('<p ') && !p.includes('<hr')) {
      return `<p>${p.replace(/\n/g, '<br>')}</p>`;
    }
    return p;
  }).join('\n');
  return text;
}

function parseTable(text) {
  const lines = text.split('\n');
  let result = [], inTable = false, tableHtml = '';
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.trim().startsWith('|')) {
      if (!inTable) {
        inTable = true;
        tableHtml = '<table><thead><tr>';
        line.split('|').filter(c => c.trim()).forEach(h => { tableHtml += `<th>${h.trim()}</th>`; });
        tableHtml += '</tr></thead><tbody>';
      } else if (line.includes('---')) { continue; }
      else {
        tableHtml += '<tr>';
        line.split('|').slice(1, -1).forEach(c => { tableHtml += `<td>${fmtInline(c.trim())}</td>`; });
        tableHtml += '</tr>';
      }
    } else {
      if (inTable) { tableHtml += '</tbody></table>'; result.push(tableHtml); inTable = false; tableHtml = ''; }
      result.push(line);
    }
  }
  if (inTable) { tableHtml += '</tbody></table>'; result.push(tableHtml); }
  return result.join('\n');
}

function fmtInline(t) {
  t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/✅/g, '<span style="color:var(--success)">✅</span>');
  t = t.replace(/❌/g, '<span style="color:var(--danger)">❌</span>');
  t = t.replace(/→/g, '<span style="color:var(--accent)">→</span>');
  return t;
}

// ─── THINKING ────────────────────────────────────────────────────────────────
function showThinking() {
  const msg = document.createElement('div');
  msg.className = 'msg ai'; msg.id = 'thinking';
  const label = document.createElement('div');
  label.className = 'msg-label'; label.textContent = 'Colink IA';
  const t = document.createElement('div');
  t.className = 'thinking';
  t.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>Analisando...';
  msg.appendChild(label); msg.appendChild(t);
  chat.appendChild(msg); chat.scrollTop = chat.scrollHeight;
}
function removeThinking() { const t = document.getElementById('thinking'); if (t) t.remove(); }

// ─── FILE HANDLING ────────────────────────────────────────────────────────────
const FILE_ICONS = {
  image: '🖼️', excel: '📊', pdf: '📄', word: '📝', text: '📋', unknown: '📎'
};

function getFileCategory(name) {
  const ext = name.split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','gif','webp'].includes(ext)) return 'image';
  if (['xlsx','xls','csv'].includes(ext)) return 'excel';
  if (ext === 'pdf') return 'pdf';
  if (['docx','doc'].includes(ext)) return 'word';
  if (ext === 'txt') return 'text';
  return 'unknown';
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

async function handleFileSelect(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  const category = getFileCategory(file.name);
  const icon = FILE_ICONS[category];
  showPendingAttachment(file.name, formatBytes(file.size), icon, category);

  // Lê o arquivo conforme o tipo
  if (category === 'image') {
    const b64 = await readAsBase64(file);
    pendingFile = { type: 'image', name: file.name, size: file.size, data: b64, mimeType: file.type };
  } else if (category === 'excel') {
    const text = await readExcelAsText(file);
    pendingFile = { type: 'text_file', name: file.name, size: file.size, data: text };
  } else {
    // PDF, Word, TXT → envia para o servidor extrair
    const b64 = await readAsBase64(file);
    pendingFile = { type: 'server_extract', name: file.name, size: file.size, data: b64, mimeType: file.type };
  }
}

function readAsBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error('Erro ao ler arquivo'));
    r.readAsDataURL(file);
  });
}

// Lê Excel com SheetJS, extrai dados E fórmulas
async function readExcelAsText(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array', cellFormula: true, cellNF: true });
        let output = `=== ARQUIVO EXCEL: ${file.name} ===\n`;
        output += `Abas: ${wb.SheetNames.join(', ')}\n\n`;

        wb.SheetNames.forEach(sheetName => {
          const ws = wb.Sheets[sheetName];
          const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
          output += `--- ABA: ${sheetName} (${range.e.r + 1} linhas x ${range.e.c + 1} colunas) ---\n`;

          // Dados como CSV
          const csv = XLSX.utils.sheet_to_csv(ws, { blankrows: false });
          output += `DADOS:\n${csv}\n\n`;

          // Fórmulas
          const formulas = [];
          Object.keys(ws).forEach(cell => {
            if (cell.startsWith('!')) return;
            const c = ws[cell];
            if (c.f) formulas.push(`${cell}: =${c.f}`);
          });
          if (formulas.length > 0) {
            output += `FÓRMULAS (${formulas.length} encontradas):\n`;
            output += formulas.join('\n') + '\n\n';
          }
        });

        res(output);
      } catch(err) {
        rej(err);
      }
    };
    r.onerror = () => rej(new Error('Erro ao ler Excel'));
    r.readAsArrayBuffer(file);
  });
}

function showPendingAttachment(name, size, icon, category) {
  const container = document.getElementById('pendingAttachment');
  container.style.display = 'block';
  container.innerHTML = `
    <div class="attachment-preview">
      <span class="att-icon">${icon}</span>
      <div class="att-info">
        <div class="att-name">${name}</div>
        <div class="att-meta">${size} · ${category}</div>
      </div>
      <button class="att-remove" onclick="clearPendingAttachment()" title="Remover">✕</button>
    </div>`;
}

function clearPendingAttachment() {
  pendingFile = null;
  const container = document.getElementById('pendingAttachment');
  container.style.display = 'none';
  container.innerHTML = '';
}

// ─── SEND ─────────────────────────────────────────────────────────────────────
async function send() {
  const text = inputBox.value.trim();
  if ((!text && !pendingFile) || isLoading) return;

  inputBox.value = '';
  inputBox.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;

  const file = pendingFile;
  clearPendingAttachment();

  // Monta mensagem visual no chat
  if (file && file.type === 'image') {
    addMessage('user', text, file.data);
  } else if (file) {
    addMessage('user', (text || '') + (text ? '\n\n' : '') + `📎 *${file.name}* anexado`);
  } else {
    addMessage('user', text);
  }

  // Monta mensagem para a API
  let userMsgContent;

  if (file && file.type === 'image') {
    // Visão: imagem + texto
    const base64Data = file.data.split(',')[1];
    userMsgContent = [
      { type: 'image_url', image_url: { url: `data:${file.mimeType};base64,${base64Data}`, detail: 'high' } }
    ];
    if (text) userMsgContent.push({ type: 'text', text });
    else userMsgContent.push({ type: 'text', text: 'Analise esta imagem no contexto do diagnóstico de processos.' });

  } else if (file && file.type === 'text_file') {
    // Excel já extraído
    userMsgContent = (text ? text + '\n\n' : '') +
      `[ARQUIVO ENVIADO: ${file.name}]\n${file.data}`;

  } else if (file && file.type === 'server_extract') {
    // PDF/Word: extrai no servidor primeiro
    showThinking();
    try {
      const resp = await fetch('/api/extract', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: file.name, data: file.data, mimeType: file.mimeType })
      });
      const result = await resp.json();
      removeThinking();
      userMsgContent = (text ? text + '\n\n' : '') +
        `[ARQUIVO ENVIADO: ${file.name}]\n${result.text}`;
    } catch(e) {
      removeThinking();
      userMsgContent = (text ? text + '\n\n' : '') +
        `[Arquivo ${file.name} enviado mas não foi possível extrair o conteúdo. Peça ao usuário para copiar o texto manualmente.]`;
    }
  } else {
    userMsgContent = text;
  }

  history.push({ role: 'user', content: userMsgContent });
  showThinking();

  try {
    const hasImage = history.length > 0 && Array.isArray(history[history.length-1].content) && history[history.length-1].content.some(c => c.type === 'image_url');
    const messages = [{ role: 'system', content: SYSTEM_PROMPT }, ...history];
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ max_tokens: 1500, messages, model: 'gpt-4o-mini' })
    });

    const data = await response.json();
    removeThinking();

    if (data.error) {
      const errDiv = document.createElement('div');
      errDiv.className = 'error-bubble';
      errDiv.textContent = 'Erro: ' + data.error.message;
      chat.appendChild(errDiv);
      history.pop();
    } else {
      const reply = data.choices[0].message.content;
      history.push({ role: 'assistant', content: reply });
      addMessage('ai', reply);

      const lr = reply.toLowerCase();
      if (lr.includes('as-is') || lr.includes('situação atual')) updateSteps(4);
      else if (lr.includes('step') || lr.includes('processo é')) updateSteps(3);
      else if (lr.includes('como o processo') || lr.includes('qual o volume')) updateSteps(2);
      else if (lr.includes('roadmap') || lr.includes('próximos passos')) updateSteps(5);
    }
  } catch (err) {
    removeThinking();
    const errDiv = document.createElement('div');
    errDiv.className = 'error-bubble';
    errDiv.textContent = 'Falha na conexão. Verifique o servidor e tente novamente.';
    chat.appendChild(errDiv);
    chat.scrollTop = chat.scrollHeight;
    history.pop();
  }

  isLoading = false;
  sendBtn.disabled = false;
  inputBox.focus();
}

// ─── INPUT EVENTS ─────────────────────────────────────────────────────────────
inputBox.addEventListener('input', () => {
  inputBox.style.height = 'auto';
  inputBox.style.height = Math.min(inputBox.scrollHeight, 140) + 'px';
});
inputBox.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// Drag & drop
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) {
    const fakeInput = { files: [file], value: '' };
    handleFileSelect(fakeInput);
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  isLoading = true; sendBtn.disabled = true; showThinking();
  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        max_tokens: 400,
        model: 'gpt-4o-mini',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: 'Inicie a sessão de diagnóstico.' }
        ]
      })
    });
    const data = await response.json();
    removeThinking();
    if (!data.error) {
      const reply = data.choices[0].message.content;
      history.push({ role: 'assistant', content: reply });
      addMessage('ai', reply);
    }
  } catch(e) {
    removeThinking();
    addMessage('ai', 'Olá! Sou o consultor de IA da **Colink**. Vamos iniciar o diagnóstico.\n\nQual empresa e setor você representa?');
  }
  isLoading = false; sendBtn.disabled = false;
}

init();
</script>
</body>
</html>
